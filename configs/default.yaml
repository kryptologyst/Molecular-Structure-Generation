# Default configuration for molecular structure generation

model:
  type: "graph_vae"  # Options: graph_vae, graph_gan, autoregressive
  z_dim: 100
  hidden_dim: 128
  max_atoms: 50
  atom_types: 10
  bond_types: 4
  dropout: 0.1

training:
  batch_size: 64
  learning_rate: 0.0002
  weight_decay: 1e-5
  num_epochs: 100
  beta: 1.0
  beta_schedule: "linear"  # Options: linear, constant
  beta_warmup: 10
  gradient_clip_val: 1.0

data:
  dataset: "zinc"  # Options: zinc, toy
  data_path: "data/"
  max_smiles_length: 100
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  subset_size: null  # Set to limit dataset size for testing

evaluation:
  metrics: ["validity", "uniqueness", "novelty", "qed", "sa", "logp", "lipinski"]
  num_samples: 1000
  batch_size: 100

sampling:
  num_samples: 10
  temperature: 1.0
  top_k: null
  top_p: null
  seed: 42

device: "auto"  # Options: auto, cpu, cuda, mps
seed: 42
log_level: "INFO"
save_dir: "checkpoints/"
log_dir: "logs/"
